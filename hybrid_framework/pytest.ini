[pytest]
testpaths     = tests
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# Markers
markers =
    smoke:    Quick sanity checks (fast, no login required)
    regression: Full regression suite
    login:    Login-related tests
    cart:     Cart-related tests
    checkout: Checkout and payment tests
    contact:  Contact form tests
    products: Product page tests
    registration: Registration tests

# Output
addopts =
    -v
    --tb=short
    --strict-markers
